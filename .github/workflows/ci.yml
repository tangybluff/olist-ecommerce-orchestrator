name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python import smoke tests
        run: |
          python -m compileall ingestion dagster_orchestration
          python -c "from ingestion.pipeline.run import run"
          python -c "from dagster_orchestration.jobs.definitions import defs"

      - name: Prepare dbt profile for parse
        run: |
          cp transform/profiles.yml.example transform/profiles.yml

      - name: dbt parse
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/fake-sa.json
          GCP_PROJECT_ID: ci-placeholder-project
          BQ_DBT_DATASET: olist_analytics
          BQ_LOCATION: europe-southwest1
        run: |
          cd transform
          dbt deps --profiles-dir .
          dbt parse --profiles-dir .
